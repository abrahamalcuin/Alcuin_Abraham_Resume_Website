<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | Alcuin Abraham</title>
  <meta name="description" content="Login to access the Alcuin Abraham SEO workspace.">
  <link rel="canonical" href="https://alcuinabraham.com/login/">
  <style>
    :root {
      --bg: #f4f4f4;
      --surface: #ffffff;
      --text: #111111;
      --muted: #5b5b5b;
      --border: #d5d5d5;
      --accent: #111111;
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #f4f4f4 0%, #ececec 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .shell {
      width: min(100%, 460px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.08);
    }
    .eyebrow {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      margin-bottom: 10px;
    }
    h1 { margin: 0 0 10px; font-size: 2rem; }
    p { margin: 0 0 20px; line-height: 1.5; color: var(--muted); }
    form { display: grid; gap: 14px; }
    label { display: grid; gap: 8px; font-weight: 600; }
    input {
      width: 100%;
      padding: 12px 14px;
      font: inherit;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
    }
    button {
      padding: 13px 16px;
      font: inherit;
      font-weight: 700;
      border: 0;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
    }
    .footer {
      margin-top: 18px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 0.95rem;
    }
    a { color: var(--text); }
  </style>
</head>
<body>
  <main class="shell">
    <div class="eyebrow">Alcuin Abraham</div>
    <h1>Login</h1>
    <p>Sign in to access your SEO workspace.</p>
    <form method="post" action="https://byui-student-advisor-api.onrender.com/login">
      <input type="hidden" name="next" value="https://byui-student-advisor-api.onrender.com/SEO">
      <label>
        Username
        <input type="text" name="username" autocomplete="username" required>
      </label>
      <label>
        Password
        <input type="password" name="password" autocomplete="current-password" required>
      </label>
      <button type="submit">Sign in</button>
    </form>
    <div class="footer">
      <a href="/">← Back home</a>
      <a href="/onboarding/">Need to create your account?</a>
    </div>
  </main>
</body>
</html>
